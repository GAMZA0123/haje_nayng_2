<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>하제냥이 뽑기판</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet">
    <style>
        :root {
            --light-purple: #f3e5f5;
            --main-purple: #ce93d8;
            --dark-purple: #ab47bc;
            --jelly-pink: #ff80ab;
            --number-color: #7b1fa2;
            --font-round: 'Jua', 'Gaegu', sans-serif;
        }

        body {
            background-color: var(--light-purple);
            font-family: var(--font-round);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { 
            color: var(--dark-purple); 
            font-size: clamp(2rem, 5vw, 3rem);
            text-shadow: 2px 2px 0px white;
            margin-bottom: 20px;
        }

        .admin-panel {
            background: white;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            width: 95%;
            max-width: 1200px;
        }

        .reward-setting-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        input {
            padding: 8px 12px;
            border-radius: 12px;
            border: 2px solid var(--main-purple);
            outline: none;
            font-family: var(--font-round);
        }

        .btn-add, .btn-remove { 
            width: 30px; height: 30px; border-radius: 50%; border: none; 
            color: white; font-size: 20px; cursor: pointer; 
        }
        .btn-add { background: #81c784; }
        .btn-remove { background: #e57373; }
        
        .button-group { display: flex; gap: 10px; margin-top: 15px; }
        .refresh-btn, .reset-btn {
            flex: 1; padding: 12px; border: none; border-radius: 15px;
            color: white; font-weight: bold; cursor: pointer; font-family: var(--font-round);
        }
        .refresh-btn { background: var(--main-purple); }
        .reset-btn { background: var(--dark-purple); }

        /* 가로 20줄 핵심 레이아웃 */
        .board {
            display: grid;
            grid-template-columns: repeat(20, 1fr); 
            gap: 6px;
            width: 100%;
            max-width: 1400px;
            background: rgba(255, 255, 255, 0.5);
            padding: 20px;
            border-radius: 30px;
        }

        @media (max-width: 1200px) { .board { grid-template-columns: repeat(10, 1fr); } }
        @media (max-width: 600px) { .board { grid-template-columns: repeat(5, 1fr); } }

        /* 발바닥 디자인 강제 고정 */
        .paw-item {
            aspect-ratio: 1 / 1;
            background: white;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            box-shadow: 0 3px 0 var(--main-purple);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* 요소가 밖으로 안 나가게 */
        }

        /* 큰 젤리 (절대 위치와 크기 재조정) */
        .paw-item::before {
            content: '';
            position: absolute;
            bottom: 10%;
            width: 55%;
            height: 45%;
            background: var(--jelly-pink) !important;
            border-radius: 50% 50% 40% 40%;
            z-index: 1;
            display: block !important;
        }

        /* 작은 젤리들 (그림자를 이용해 3개 발가락 구현) */
        .paw-item::after {
            content: '';
            position: absolute;
            top: 15%;
            width: 18%;
            height: 22%;
            background: var(--jelly-pink) !important;
            border-radius: 50%;
            /* 중앙 발가락 기준 좌우 발가락 그림자 */
            box-shadow: -22px 6px 0 var(--jelly-pink), 22px 6px 0 var(--jelly-pink);
            z-index: 2;
            display: block !important;
        }

        .paw-number {
            position: absolute;
            z-index: 10;
            font-weight: bold;
            font-size: clamp(10px, 1.2vw, 16px);
            color: var(--number-color);
            text-shadow: 1px 1px 0 white;
            top: 45%; /* 중앙에 숫자 배치 */
        }

        .paw-item.opened { background: #eee; opacity: 0.2; box-shadow: none; }
        .paw-item.opened::before, .paw-item.opened::after { display: none !important; }

        /* 팝업 모달 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 35px; text-align: center;
            border: 6px solid var(--jelly-pink); min-width: 280px;
        }
        .reward-text { font-size: 2rem; font-weight: bold; color: var(--dark-purple); margin: 20px 0; }
        .close-modal-btn { 
            padding: 10px 30px; background: var(--dark-purple); color: white; 
            border: none; border-radius: 15px; font-family: var(--font-round); cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🐾 하제냥이 뽑기판 🐾</h1>

    <div class="admin-panel">
        <div id="rewardInputs"></div>
        <div class="button-group">
            <button class="refresh-btn" onclick="initBoard()">설정 적용</button>
            <button class="reset-btn" onclick="resetCurrentBoard()">판 새로고침</button>
        </div>
    </div>

    <div class="board" id="gameBoard"></div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div id="modalIcon" style="font-size: 60px;">🐱</div>
            <h2 id="modalTitle">축하한다냥!</h2>
            <div class="reward-text" id="rewardResult">보상</div>
            <button class="close-modal-btn" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <script>
        let gameData = [];

        window.onload = function() {
            const savedRewards = localStorage.getItem('hajeNyang_vfinal_20');
            if (savedRewards) {
                const rewards = JSON.parse(savedRewards);
                rewards.forEach((reward, index) => addRow(reward.name, reward.qty, index === 0));
            } else {
                addRow('🐟 츄르', 1, true);
                addRow('💀 꽝', 39, false);
            }
            initBoard();
        };

        function addRow(name = '', qty = 1, isFirst = false) {
            const container = document.getElementById('rewardInputs');
            const div = document.createElement('div');
            div.className = 'reward-setting-row';
            div.innerHTML = `
                <input type="text" class="reward-name" value="${name}" oninput="saveToLocal()" style="flex:2">
                <input type="number" class="reward-qty" value="${qty}" style="width:50px" oninput="saveToLocal()">
                ${isFirst ? `<button class="btn-add" onclick="addRow('', 1, false)">+</button>` : `<button class="btn-remove" onclick="removeRow(this)">-</button>`}
            `;
            container.appendChild(div);
            saveToLocal();
        }

        function removeRow(btn) { btn.parentElement.remove(); saveToLocal(); }

        function saveToLocal() {
            const names = document.querySelectorAll('.reward-name');
            const qtys = document.querySelectorAll('.reward-qty');
            const list = [];
            names.forEach((n, i) => list.push({ name: n.value, qty: parseInt(qtys[i].value || 0) }));
            localStorage.setItem('hajeNyang_vfinal_20', JSON.stringify(list));
        }

        function initBoard() {
            const names = document.querySelectorAll('.reward-name');
            const qtys = document.querySelectorAll('.reward-qty');
            gameData = [];
            names.forEach((n, i) => {
                for(let j=0; j<parseInt(qtys[i].value || 0); j++) gameData.push(n.value);
            });
            renderBoard();
        }

        function resetCurrentBoard() { renderBoard(); }

        function renderBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            const shuffle = [...gameData].sort(() => Math.random() - 0.5);
            shuffle.forEach((reward, i) => {
                const item = document.createElement('div');
                item.className = 'paw-item';
                item.innerHTML = `<span class="paw-number">${i+1}</span>`;
                item.onclick = () => {
                    if(item.classList.contains('opened')) return;
                    item.classList.add('opened');
                    const isFail = reward.includes('꽝') || reward.includes('다음');
                    document.getElementById('modalIcon').innerText = isFail ? "😿" : "🐱";
                    document.getElementById('modalTitle').innerText = isFail ? "아쉽다냥... 위로해줄게!" : "축하한다냥!";
                    document.getElementById('rewardResult').innerText = reward;
                    document.getElementById('resultModal').style.display = 'flex';
                };
                board.appendChild(item);
            });
        }

        function closeModal() { document.getElementById('resultModal').style.display = 'none'; }
    </script>
</body>
</html>
